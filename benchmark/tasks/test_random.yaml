agent:
  policy: random
  prompt_style: preselection
  generation:
    seed: 42
  tools:
    - think
    - profile_datasets
    - vlm_filter
    - compute_mix_ratio
    - vlm_mix
    - save_to_disk

env:
  episodes: 1
  max_steps: 15

task:
  task_description: >
    Curate visual instruction-tuning data for LLaVA-1.5-7B
    to maximize performance on MMVet.
    (Random baseline — no LLM, random tool selection.)

  target_model: "llava-hf/llava-1.5-7b-hf"
  sample_budget: 50
  profiling_sample_n: 10
  output_path: test_random_mix.parquet

  datasets:
    - name: vqav2
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "vqav2"
      columns:
        text: texts
        image: images

    - name: captcha
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "captcha"
      columns:
        text: texts
        image: images
