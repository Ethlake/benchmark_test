benchmark:
  run_budget: 50
  allowed_tools:
    - load_dataset
    - vlm_mix
    - submit_finetune
    - submit_eval
  constraints:
    - "The recipe must stay within sample_budget."
    - "Only benchmark-owned tools may be used."

task:
  task_description: >
    Smoke test task: build a tiny mixed dataset, finetune, and evaluate.
  target_model: "llava-hf/llava-1.5-7b-hf"
  sample_budget: 50
  profiling_sample_n: 10
  output_path: smoke_mix.parquet

  training_config:
    method: llava
    gpu_ids: [0]
    deepspeed_config: zero3
    max_steps: 5

  eval:
    benchmarks: ["MMMU_DEV_VAL"]
    gpu_id: 0
    max_samples: 20
    use_vllm: true
    api_nproc: 8

  datasets:
    - name: vqav2
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "vqav2"
      columns:
        text: texts
        image: images

    - name: captcha
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "captcha"
      columns:
        text: texts
        image: images
