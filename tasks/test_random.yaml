benchmark:
  run_budget: 50
  allowed_tools:
    - profile_datasets
    - compute_mix_ratio
    - vlm_filter
    - quality_filter
    - vlm_mix
    - submit_finetune
    - submit_eval
  constraints:
    - "Mixing ratios should sum to 1.0 or 100.0."

task:
  task_description: >
    Curate visual instruction-tuning data for LLaVA-1.5-7B and evaluate the result.
  target_model: "llava-hf/llava-1.5-7b-hf"
  sample_budget: 50
  profiling_sample_n: 10
  output_path: test_random_mix.parquet

  training_config:
    method: llava
    max_steps: 10

  eval:
    benchmarks: ["MMMU_DEV_VAL"]

  datasets:
    - name: vqav2
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "vqav2"
      columns:
        text: texts
        image: images

    - name: captcha
      source:
        local_path: "/helios-storage/helios4-data/fyk/mmds/FineVision5"
        split: "captcha"
      columns:
        text: texts
        image: images
